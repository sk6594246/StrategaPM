<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Manager</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 16px;
    padding: 32px;
    width: 320px;
    color: #f1f5f9;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .card h1 { font-size: 1.3rem; margin-bottom: 20px; text-align: center; }
  .card input {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.07);
    color: #fff;
    box-sizing: border-box;
  }
  .card button {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #6366f1;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
  }
  .card button:hover { background: #4f46e5; }
  .error { color: #f87171; font-size: 0.85rem; margin-bottom: 10px; min-height: 1em; }
  #app { display: none; text-align: center; color: #f1f5f9; }
</style>
</head>
<body>

  <div id="login-view" class="card">
    <h1>Task Manager Login</h1>
    <div id="error-msg" class="error"></div>
    <input id="userID" type="text" placeholder="User ID" autocomplete="username" />
    <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
    <button id="login-btn">Login</button>
  </div>

  <div id="app">
    <h2>Welcome, <span id="welcome-user"></span></h2>
    <p>Fresh data fetch would run here (Feature #2).</p>
    <button id="logout-btn">Logout</button>
  </div>

  <script src="js/config.js"></script>
  <script src="js/crypto.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const loginView = document.getElementById("login-view");
    const appView = document.getElementById("app");
    const errorMsg = document.getElementById("error-msg");

    // Placeholder for Feature #2 — replace with real Sheet fetch + router init.
    async function onLoginSuccess(userID) {
      loginView.style.display = "none";
      appView.style.display = "block";
      document.getElementById("welcome-user").textContent = userID;
      // TODO: fetch fresh data from Google Sheet here (Feature #2)
    }

    function onLogout() {
      appView.style.display = "none";
      loginView.style.display = "block";
      document.getElementById("userID").value = "";
      document.getElementById("password").value = "";
    }

    document.getElementById("login-btn").addEventListener("click", async () => {
      errorMsg.textContent = "";
      const userID = document.getElementById("userID").value.trim();
      const password = document.getElementById("password").value;

      const result = await Auth.login(userID, password);
      if (!result.success) {
        errorMsg.textContent = result.message || "Login failed.";
      }
    });

    document.getElementById("logout-btn").addEventListener("click", () => {
      Auth.logout();
    });

    // On page load, check for an existing session (Feature #2 trigger)
    window.addEventListener("DOMContentLoaded", () => {
      Auth.restoreSession();
    });
  </script>
</body>
</html>
